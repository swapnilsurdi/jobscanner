# Watchlist. Each entry may use one or more ATS endpoints OR a careers URL
# (Playwright fallback). The scanner tries `ats` first; if missing or fails,
# it falls back to `careers_url` via Playwright MCP.
#
# Supported ats values: greenhouse, ashby, lever, workday, smartrecruiters
# slug = the company identifier on that ATS host.
#
# Order has no meaning to the scanner; only filters in config/filters.yml decide what's surfaced.

