<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jobscanner</title>
  <meta name="description" content="A read-only feed of scraped software-engineering roles from a curated company watchlist.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>jobscanner</h1>
    <p class="tagline">a read-only feed of software roles from a curated company watchlist.</p>
    <dl class="stats">
      <div><dt>roles</dt><dd id="count">—</dd></div>
      <div><dt>companies</dt><dd id="companies">—</dd></div>
      <div><dt>updated</dt><dd id="updated">—</dd></div>
    </dl>
  </header>

  <section class="controls">
    <input id="search" type="search" placeholder="search title, company, location…" autocomplete="off" spellcheck="false" aria-label="search jobs">
    <button id="clear" type="button">clear</button>
  </section>

  <main>
    <div class="table-wrap">
      <table id="grid" aria-label="job postings">
        <thead>
          <tr>
            <th class="col-company">company</th>
            <th class="col-title">title</th>
            <th class="col-loc">location</th>
            <th class="col-date">posted</th>
            <th class="col-date">seen</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <p id="status" class="status" role="status">loading…</p>
    <div class="more-wrap">
      <button id="more" type="button" hidden>load more</button>
    </div>
  </main>

  <footer>
    <small>data updates from a local scanner · part of <a href="https://surdi.in" rel="noopener">surdi.in</a></small>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
